name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v7.25.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ref="$INPUT_TAG"
          else
            ref="${GITHUB_REF#refs/tags/}"
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.ref }}

      - name: Verify manifest version matches tag
        run: |
          manifest_version=$(jq -r '.version' custom_components/purellm/manifest.json)
          tag_version="${{ steps.tag.outputs.version }}"
          if [ "$manifest_version" != "$tag_version" ]; then
            echo "ERROR: manifest.json version ($manifest_version) does not match tag (v$tag_version)"
            exit 1
          fi

      - name: Create release zip
        run: |
          cd custom_components/purellm
          zip -r ../../purellm.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          generate_release_notes: true
          files: purellm.zip
